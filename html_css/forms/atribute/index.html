<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Form Atribute</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.css" integrity="sha256-WAgYcAck1C1/zEl5sBl5cfyhxtLgKGdpI3oKyJffVRI=" crossorigin="anonymous" />
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <form>
        <div class="form-control">
            <label for="lasy-name-form-control">Last Name</label>
            <input type="text" id="lasy-name-form-control" name="lastName" readonly value="Emerson">
        </div>
        <div class="form-control">
            <label for="age-form-control">Age</label>
            <input type="number" id="age-form-control" required min="3" max="10" name="age" value="17">
        </div>
        <div class="form-control">
            <label>
                <input type="checkbox" id="checkbox-label" name="agree" disabled>
                <label for="checkbox-label">Accept terms and conditions</label>
            </label>
        </div>
        <div class="choose-gender">
            <input type="radio" id="gender-male" name="gender">
            <label for="gender-male">Male</label>
            <input type="radio" id="gender-female" name="gender">
            <label for="gender-female">Female</label>
            <input type="radio" id="gender-secret" name="gender">
            <label for="gender-secret">Secret</label>
        </div>
        <div class="form-control">
            <textarea maxlength="10" name="description" placeholder="Write description..."></textarea>
        </div>
        <div class="form-control">
            <button type="submit">Submit</button>
        </div>
    </form>
</body>

</html>
